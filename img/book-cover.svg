<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="250" fill="url(#bg)" rx="8"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="440" height="4" fill="url(#accent)" rx="2"/>

  <!-- VPN/Shield icon -->
  <g transform="translate(55, 45)">
    <!-- Shield outline -->
    <path d="M50 5 L90 20 L90 60 Q90 95 50 110 Q10 95 10 60 L10 20 Z"
          fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <!-- Shield inner fill -->
    <path d="M50 12 L83 25 L83 58 Q83 88 50 102 Q17 88 17 58 L17 25 Z"
          fill="#3b82f6" opacity="0.15"/>
    <!-- Lock/key icon inside shield -->
    <circle cx="50" cy="48" r="12" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <rect x="42" y="56" width="16" height="18" rx="3" fill="#3b82f6" opacity="0.4" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="50" cy="65" r="3" fill="#93c5fd"/>
    <!-- Connection dots -->
    <circle cx="30" cy="35" r="2" fill="#60a5fa" opacity="0.6"/>
    <circle cx="70" cy="35" r="2" fill="#60a5fa" opacity="0.6"/>
    <line x1="32" y1="35" x2="44" y2="45" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="68" y1="35" x2="56" y2="45" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Module title -->
  <text x="210" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="start">Mikrotik</text>
  <text x="210" y="85" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="start">WireGuard VPN</text>

  <!-- Subtitle -->
  <text x="210" y="112" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="start">WHMCS Server Module</text>

  <!-- Divider -->
  <rect x="210" y="124" width="60" height="2" fill="#2563eb" rx="1"/>

  <!-- Description -->
  <text x="210" y="148" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">Automated WireGuard VPN provisioning</text>
  <text x="210" y="164" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">on Mikrotik routers via REST API</text>

  <!-- PUQ Cloud branding -->
  <g transform="translate(30, 210)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2563eb">PUQ</text>
    <text x="55" y="15" font-family="Arial, sans-serif" font-size="12" fill="#64748b">cloud</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(370, 218)">
    <rect x="0" y="0" width="45" height="20" rx="4" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1"/>
    <text x="22" y="14" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">v3.1</text>
  </g>
</svg>
